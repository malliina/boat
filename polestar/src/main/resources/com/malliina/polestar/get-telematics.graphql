query CarTelematicsV2($vins: [String!]!) {
  carTelematicsV2(vins: $vins) {
    health {
      vin
      brakeFluidLevelWarning
      daysToService
      distanceToServiceKm
      engineCoolantLevelWarning
      timestamp { seconds nanos }
      oilLevelWarning
      serviceWarning
    }
    odometer {
      vin
      timestamp { seconds nanos }
      odometerMeters
    }
  }
}
